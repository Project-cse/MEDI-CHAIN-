org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Use Android Studio bundled JDK (fixes "Cannot find Java 17" on Windows)
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr
# Avoid Kotlin incremental cache corruption on Windows (parallel builds / path with spaces)
kotlin.incremental=false
org.gradle.parallel=false
android.useAndroidX=true
# AGP 9 defaults uniquePackageNames=true; Razorpay standard-core + core both use com.razorpay.
android.uniquePackageNames=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
